name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      module:
        description: 'Choose module to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - load_data
          - quality_analysis
          - data_research
          - visualize

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [load_data, quality_analysis, data_research, visualize]

    steps:
      - name: Checkout code
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Prepare data
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        env:
          PYTHONPATH: src
        run: python src/main.py

      - name: Create artifact directory
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        run: mkdir -p artifacts/${{ matrix.module }}

      - name: Run module
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        env:
          PYTHONPATH: src
        run: |
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/run.log 2>&1 || true
          if [ -d "reports/figures" ]; then cp -r reports/figures/* artifacts/${{ matrix.module }}/ 2>/dev/null || true; fi

      - name: Upload Artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}