name: CI (self-hosted)

on:
  workflow_dispatch:

jobs:
  run-local:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data
        env:
          PYTHONPATH: src
        run: python src/load_data.py

      - name: Run visualization module
        env:
          PYTHONPATH: src
        run: python src/visualize.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: result-visualize-selfhosted
          path: reports/figures