apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-web-deployment
  namespace: ai-analytics-app
  labels:
    app: analytics-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-web
  template:
    metadata:
      labels:
        app: analytics-web
    spec:
      containers:
        - name: web-container
          image: ghcr.io/sofiapryslipska/open-data-ai-analytics-web:v1.0.1
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "gitops"
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "secretpassword"
            - name: POSTGRES_DB
              value: "analytics_db"
            - name: POSTGRES_HOST
              value: "10.0.1.4"
            - name: POSTGRES_PORT
              value: "5432"