apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sofia-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/sofiaPryslipska/open-data-ai-analytics.git'
    targetRevision: master
    path: gitops/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-analytics-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true