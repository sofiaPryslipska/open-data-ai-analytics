version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: analytics_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  data_load:
    build: ./data_load
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  quality_analysis:
    build: ./quality_analysis
    depends_on:
      data_load:
        condition: service_completed_successfully
    volumes:
      - shared_data:/shared

  data_research:
    build: ./data_research
    depends_on:
      data_load:
        condition: service_completed_successfully
    volumes:
      - shared_data:/shared

  visualization:
    build: ./visualization
    depends_on:
      data_load:
        condition: service_completed_successfully
    volumes:
      - shared_data:/shared

  web:
    build: ./web
    ports:
      - "5000:5000"
    depends_on:
      visualization:
        condition: service_completed_successfully
    volumes:
      - shared_data:/shared

volumes:
  pgdata:
  shared_data: